name = "news-ai-proxy"
main = "ai-proxy.js"
compatibility_date = "2024-01-01"

# GROQ_API_KEY should be set as a secret:
# wrangler secret put GROQ_API_KEY

# KV namespace for persistent rate limiting
# Create with: wrangler kv namespace create RATE_LIMIT
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
