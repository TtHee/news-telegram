name: Fetch News

on:
  workflow_dispatch:  # 由 cron-job.org 透過 API 觸發

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 允許推送 news.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch_news.py
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          FRED_API_KEY:         ${{ secrets.FRED_API_KEY }}
          NEWSDATA_API_KEY:     ${{ secrets.NEWSDATA_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit and push news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/news.json
          git diff --staged --quiet || git commit -m "chore: update news.json [skip ci]"
          git push
