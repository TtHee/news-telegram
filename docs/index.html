<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header-bar">
        <div class="logo-area">
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
            <h1>Pulse</h1>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="搜尋新聞標題或摘要...">
        </div>
        <div class="last-updated" id="lastUpdated">更新於 --/-- --:--</div>
    </header>

    <div class="main-container">
        <!-- Tablet/Desktop Sidebar, Mobile top sliding menu -->
        <aside class="sidebar" id="sidebar">
            <div class="widget market-widget">
                <div class="widget-title">📡 市場風向</div>
                <div class="market-grid">
                    <div class="market-item" id="market-TWII">
                        <span class="market-signal" id="signal-TWII">⚪</span>
                        <span class="market-name" title="台灣加權股價指數：台灣股市大盤指標">台股</span>
                        <div class="market-data">
                            <span class="market-change">--</span>
                            <span class="market-price">--</span>
                        </div>
                    </div>
                    <div class="market-item" id="market-SP500">
                        <span class="market-signal" id="signal-SP500">⚪</span>
                        <span class="market-name" title="標準普爾 500 指數：追蹤美國 500 大上市公司，是美股最重要的指標之一">S&P500</span>
                        <div class="market-data">
                            <span class="market-change">--</span>
                            <span class="market-price">--</span>
                        </div>
                    </div>
                    <div class="market-item" id="market-VIX">
                        <span class="market-signal" id="signal-VIX">⚪</span>
                        <span class="market-name" title="CBOE 波動率指數（恐慌指數）：衡量市場對未來 30 天波動的預期，數值越高代表市場越恐慌，通常 >25 為高風險">VIX</span>
                        <span class="market-price">--</span>
                    </div>
                    <div class="market-item" id="market-TNX">
                        <span class="market-signal" id="signal-TNX">⚪</span>
                        <span class="market-name" title="美國 10 年期公債殖利率：反映市場對經濟前景和通膨的預期，殖利率上升代表借貸成本增加，可能對股市造成壓力">美債10Y</span>
                        <span class="market-price">--</span>
                    </div>
                    <div class="market-item" id="market-MOVE">
                        <span class="market-signal" id="signal-MOVE">⚪</span>
                        <span class="market-name" title="ICE BofA MOVE 指數：衡量債券市場波動率，類似債市的 VIX，>100 代表債市波動加劇">MOVE</span>
                        <span class="market-price">--</span>
                    </div>
                    <div class="market-item" id="market-DXY">
                        <span class="market-signal" id="signal-DXY">⚪</span>
                        <span class="market-name" title="美元指數：衡量美元對一籃子貨幣的強弱，急漲通常代表避險情緒升高">美元指數</span>
                        <span class="market-price">--</span>
                    </div>
                    <div class="market-item" id="market-GOLD">
                        <span class="market-signal" id="signal-GOLD">⚪</span>
                        <span class="market-name" title="黃金期貨價格（美元/盎司）：傳統避險資產，金價急漲通常代表市場不安，單日漲 >2% 留意、>5% 高風險">黃金</span>
                        <div class="market-data">
                            <span class="market-change">--</span>
                            <span class="market-price">--</span>
                        </div>
                    </div>
                </div>
                <div class="ai-summary" id="aiSummary">載入中...</div>
            </div>

            <nav class="category-menu" id="categoryMenu">
                <button class="chip active" data-category="all">全部</button>
                <button class="chip" data-category="trends">🔥 Google Trends</button>
                <button class="chip" data-category="whitehouse">🏛️ 白宮</button>
                <button class="chip" data-category="trump">🇺🇸 川普</button>
                <button class="chip" data-category="ai">🤖 AI</button>
                <button class="chip" data-category="global">🌍 全球趨勢</button>
                <button class="chip" data-category="finance">💰 財經</button>
                <button class="chip" data-category="stock_tw">📉 台股</button>
                <button class="chip" data-category="stock_us">📈 美股</button>
            </nav>
            <div class="filter-controls">
                <label class="filter-label"><input type="checkbox" id="filterUnread"> 未讀</label>
                <label class="filter-label"><input type="checkbox" id="filterSaved"> 已收藏</label>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Right Main Area -->
        <main class="content-area">
            <div id="loading" class="loading">載入新聞中...</div>
            <div id="errorMsg" class="error-msg" style="display: none;">載入失敗，請稍後再試。</div>
            <div class="news-grid" id="newsContainer">
                <!-- News cards render here -->
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
